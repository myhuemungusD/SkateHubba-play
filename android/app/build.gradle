apply plugin: 'com.android.application'

// ---- Version resolution ----------------------------------------------------
// Single source of truth: package.json at the repo root. CI can override.
//
// versionName precedence:
//   1. -PversionName=x.y.z  (Gradle project property, typically from CI)
//   2. package.json "version" (local dev default)
//
// versionCode precedence:
//   1. -PversionCode=NNN       (Gradle project property, e.g. CI run number)
//   2. ANDROID_VERSION_CODE    (environment variable)
//   3. Computed from versionName as major*10000 + minor*100 + patch
//      (e.g. 1.2.3 -> 10203). Fallback only; CI should always pass an
//      explicit monotonically-increasing -PversionCode for Play Store.
def pkgJsonFile = file("../../package.json")
def pkgJson = new groovy.json.JsonSlurper().parse(pkgJsonFile)
def resolvedVersionName = project.hasProperty('versionName') ? project.versionName : pkgJson.version

def resolvedVersionCode
if (project.hasProperty('versionCode')) {
    resolvedVersionCode = project.versionCode.toString().toInteger()
} else if (System.getenv('ANDROID_VERSION_CODE')) {
    resolvedVersionCode = System.getenv('ANDROID_VERSION_CODE').toInteger()
} else {
    // Parse "x.y.z" → x*10000 + y*100 + z. Each segment is coerced to an
    // int with a non-numeric suffix stripped ("3-beta" → "3"). If a segment
    // is missing or, after stripping, contains no digits at all ("beta" or
    // an empty patch), fall back to 0 instead of throwing — package.json
    // values are trusted input, but the parser shouldn't become a release
    // footgun the moment someone ships "1.2-rc" locally.
    def parseSegment = { String raw ->
        def cleaned = raw == null ? '' : raw.replaceAll('[^0-9].*$', '')
        return cleaned.isEmpty() ? 0 : cleaned.toInteger()
    }
    def parts = resolvedVersionName.toString().split('\\.')
    def major = parts.length > 0 ? parseSegment(parts[0]) : 0
    def minor = parts.length > 1 ? parseSegment(parts[1]) : 0
    def patch = parts.length > 2 ? parseSegment(parts[2]) : 0
    resolvedVersionCode = major * 10000 + minor * 100 + patch
}
// ---------------------------------------------------------------------------

android {
    namespace = "com.skatehubba.app"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.skatehubba.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode resolvedVersionCode
        versionName resolvedVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    bundle {
        language {
            enableSplit = true
        }
        density {
            enableSplit = true
        }
        abi {
            enableSplit = true
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
