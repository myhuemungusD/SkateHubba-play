name: Bug report
description: Something in the app is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **security vulnerabilities**, do not use this form — email security@skatehubba.com (see SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Tap ...
        3. See error
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      multiple: true
      options:
        - Web (desktop browser)
        - Web (mobile browser)
        - Android (installed app)
        - iOS (installed app)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      description: Footer version string, release tag (e.g. v1.1.0), or git SHA.
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 126 on macOS 14, Safari on iOS 17
    validations:
      required: false
  - type: textarea
    id: console
    attributes:
      label: Console errors / logs
      description: Paste browser console or Sentry errors. Redact tokens and personal data.
      render: text
    validations:
      required: false
