name: Deploy Firebase Rules

# Automates deployment of Firestore security rules, Firestore composite
# indexes, and Cloud Storage rules whenever those files land on `main`.
#
# Only the rules/indexes surface is deployed — Cloud Functions, Hosting, and
# app code are explicitly excluded to preserve the "no Cloud Functions in
# PRs" invariant documented in .github/BRANCH_PROTECTION.md and CLAUDE.md.
#
# Authentication:
#   Uses Google Cloud Workload Identity Federation via
#   `google-github-actions/auth@v2` when both `FIREBASE_WIF_PROVIDER` and
#   `FIREBASE_WIF_SERVICE_ACCOUNT` secrets are set. Falls back to the legacy
#   `FIREBASE_TOKEN` secret so existing projects keep working.
#
#   NOTE: `FIREBASE_TOKEN` (from `firebase login:ci`) is DEPRECATED in
#   firebase-tools and is the most likely cause of a deploy that worked for
#   months then began failing. Migrate to WIF and verify/rotate the secret in
#   GitHub → Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-rules-deploy.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — skip the actual deploy step."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  # Freshness guard. firebase-tools v15 has no reliable "fetch live deployed
  # rules" command to diff against HEAD, so instead we re-run the full deploy
  # daily. The deploy is idempotent (re-uploading identical rules is a no-op),
  # and any drift between `main` and production can therefore never exceed 24h.
  # If this scheduled deploy fails, the `Alert on deploy failure` step files an
  # issue exactly as it does for push-triggered deploys.
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily

concurrency:
  group: firebase-rules-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  # `issues: write` lets the failure-notification step open/update the alert
  # issue so a broken deploy can never again pass unnoticed.
  issues: write

jobs:
  validate-rules:
    name: Validate rules against emulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Run Firestore rules unit tests
        run: npm run test:rules

  deploy:
    name: Deploy to Firebase
    needs: validate-rules
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Resolve Firebase project
        id: project
        run: |
          PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::FIREBASE_PROJECT_ID secret is not set."
            echo "Add it in GitHub → Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Authenticate via Workload Identity Federation
        id: wif
        if: ${{ secrets.FIREBASE_WIF_PROVIDER != '' && secrets.FIREBASE_WIF_SERVICE_ACCOUNT != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.FIREBASE_WIF_PROVIDER }}
          service_account: ${{ secrets.FIREBASE_WIF_SERVICE_ACCOUNT }}

      - name: Verify authentication method
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          WIF_PROVIDER: ${{ secrets.FIREBASE_WIF_PROVIDER }}
        run: |
          if [ -n "$WIF_PROVIDER" ]; then
            echo "Using Workload Identity Federation."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "Using legacy FIREBASE_TOKEN. Migrate to WIF when convenient."
          else
            echo "::error::No Firebase credentials available."
            echo "Set FIREBASE_WIF_PROVIDER + FIREBASE_WIF_SERVICE_ACCOUNT (preferred),"
            echo "or FIREBASE_TOKEN (legacy) in GitHub → Settings → Secrets."
            exit 1
          fi

      - name: Deploy rules and indexes
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          # Only pass FIREBASE_TOKEN when WIF isn't configured — firebase-tools
          # prefers FIREBASE_TOKEN over Application Default Credentials, so
          # leaving both set silently bypasses WIF.
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_WIF_PROVIDER == '' && secrets.FIREBASE_TOKEN || '' }}
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
        run: |
          # firebase-tools is pinned to the same major the repo depends on
          # (package.json: firebase-tools@^15). The deploy must hard-fail on
          # any error — no `|| true`, no `continue-on-error` — so an auth or
          # permission failure surfaces as a red job, not a silent pass.
          set -euo pipefail
          npx --yes firebase-tools@15 deploy \
            --project "$PROJECT_ID" \
            --only firestore:rules,firestore:indexes,storage:rules \
            --non-interactive \
            --force

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "### Dry run" >> "$GITHUB_STEP_SUMMARY"
          echo "Rules validated against the emulator; deploy step skipped." >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------------
      # Loud failure alerting. If ANY step in this job fails (auth, project
      # resolution, or the deploy itself) open — or update — a single tracking
      # issue so a broken rules deploy can never sit unnoticed again. Idempotent:
      # reuses the one open issue carrying the `firebase-rules-deploy-failure`
      # label instead of spamming a new issue per run.
      # ---------------------------------------------------------------------
      - name: Alert on deploy failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'firebase-rules-deploy-failure';
            const title = '🚨 Firebase rules deploy FAILED';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The **Deploy Firebase Rules** workflow failed.',
              '',
              `- Failed run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Triggered by: \`${context.eventName}\``,
              '',
              'Production Firestore/Storage rules and indexes may now be **stale**.',
              'Investigate the run logs above, then re-run the workflow once fixed.',
              '',
              '_This issue is auto-managed; it will be updated (not duplicated) on repeat failures._',
            ].join('\n');

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label,
                  color: 'b60205',
                  description: 'Automated alert: Firebase rules deploy failed',
                });
              } else {
                throw e;
              }
            }

            // Find an existing open alert issue to update instead of spamming.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body,
              });
              core.notice(`Updated existing alert issue #${number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: [label],
              });
              core.notice(`Opened alert issue #${created.data.number}.`);
            }
