name: Deploy Firebase Rules

# Automates deployment of Firestore security rules, Firestore composite
# indexes, and Cloud Storage rules whenever those files land on `main`.
#
# Only the rules/indexes surface is deployed — Cloud Functions, Hosting, and
# app code are explicitly excluded to preserve the "no Cloud Functions in
# PRs" invariant documented in .github/BRANCH_PROTECTION.md and CLAUDE.md.
#
# Project resolution:
#   The deploy job reads the target project ID from the `FIREBASE_PROJECT_ID`
#   secret first.  If that secret is empty, it falls back to the `default`
#   project in `.firebaserc` (parsed with `jq`, preinstalled on GitHub-hosted
#   runners).  The step fails only when neither source provides a project ID.
#
# Authentication:
#   Uses Google Cloud Workload Identity Federation via
#   `google-github-actions/auth@v2` when both `FIREBASE_WIF_PROVIDER` and
#   `FIREBASE_WIF_SERVICE_ACCOUNT` secrets are set. Falls back to the legacy
#   `FIREBASE_TOKEN` secret so existing projects keep working.
#
#   NOTE: `FIREBASE_TOKEN` (from `firebase login:ci`) is DEPRECATED in
#   firebase-tools and is the most likely cause of a deploy that worked for
#   months then began failing. Migrate to WIF and verify/rotate the secret in
#   GitHub → Settings → Secrets and variables → Actions.

on:
  push:
    branches: [main]
    paths:
      - "firestore.rules"
      - "firestore.indexes.json"
      - "storage.rules"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/firebase-rules-deploy.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — skip the actual deploy step."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  # Freshness guard. firebase-tools v15 has no reliable "fetch live deployed
  # rules" command to diff against HEAD, so instead we re-run the full deploy
  # daily. The deploy is idempotent (re-uploading identical rules is a no-op),
  # and any drift between `main` and production can therefore never exceed 24h.
  # If this scheduled deploy fails, the `Alert on deploy failure` step files an
  # issue exactly as it does for push-triggered deploys.
  schedule:
    - cron: "0 7 * * *" # 07:00 UTC daily

concurrency:
  group: firebase-rules-deploy
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  # `issues: write` lets the failure-notification step open/update the alert
  # issue so a broken deploy can never again pass unnoticed.
  issues: write

jobs:
  validate-rules:
    name: Validate rules against emulator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Run Firestore rules unit tests
        run: npm run test:rules

  deploy:
    name: Deploy to Firebase
    needs: validate-rules
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Resolve Firebase project
        id: project
        run: |
          PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID }}"
          if [ -z "$PROJECT_ID" ]; then
            echo "FIREBASE_PROJECT_ID secret is empty — falling back to .firebaserc"
            # `// empty` returns "" when .projects or .default is missing,
            # rather than the literal string "null" that `jq -r .a.b` would
            # emit. Keeps the `-z` check below correct.
            PROJECT_ID=$(jq -r '.projects.default // empty' .firebaserc)
          fi
          if [ -z "$PROJECT_ID" ]; then
            echo "::error::Cannot resolve Firebase project ID."
            echo "Set the FIREBASE_PROJECT_ID secret, or add a default project to .firebaserc."
            exit 1
          fi
          echo "Resolved project: $PROJECT_ID"
          echo "project_id=$PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Detect available credentials
        id: creds
        env:
          WIF_PROVIDER: ${{ secrets.FIREBASE_WIF_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_WIF_SERVICE_ACCOUNT }}
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          # Secrets must be surfaced via env first — referencing `secrets.*`
          # directly in step-level `if:` expressions evaluates to null at
          # validation time (documented GH Actions quirk), so a "gate" written
          # that way is always-on and never actually gates.
          if [ -n "$WIF_PROVIDER" ] && [ -n "$WIF_SERVICE_ACCOUNT" ]; then
            echo "method=wif" >> "$GITHUB_OUTPUT"
            echo "Using Workload Identity Federation."
          elif [ -n "$FIREBASE_TOKEN" ]; then
            echo "method=token" >> "$GITHUB_OUTPUT"
            echo "Using legacy FIREBASE_TOKEN. Migrate to WIF when convenient."
          else
            echo "::error::No Firebase credentials available."
            echo "Set FIREBASE_WIF_PROVIDER + FIREBASE_WIF_SERVICE_ACCOUNT (preferred),"
            echo "or FIREBASE_TOKEN (legacy) in GitHub → Settings → Secrets."
            exit 1
          fi

      - name: Authenticate via Workload Identity Federation
        if: steps.creds.outputs.method == 'wif'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.FIREBASE_WIF_PROVIDER }}
          service_account: ${{ secrets.FIREBASE_WIF_SERVICE_ACCOUNT }}

      - name: Deploy rules and indexes
        id: deploy
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          # Only pass FIREBASE_TOKEN when WIF isn't configured — firebase-tools
          # prefers FIREBASE_TOKEN over Application Default Credentials, so
          # leaving both set silently bypasses WIF.
          FIREBASE_TOKEN: ${{ steps.creds.outputs.method == 'token' && secrets.FIREBASE_TOKEN || '' }}
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
        run: |
          # firebase-tools is pinned to the same major the repo depends on
          # (package.json: firebase-tools@^15). The deploy must hard-fail on
          # any error — no `|| true`, no `continue-on-error` — so an auth or
          # permission failure surfaces as a red job, not a silent pass.
          #
          # `storage` has no subtype — `--only storage:rules` is invalid syntax
          # and fails with "Could not find rules for the following storage
          # targets: rules". For a single-bucket project, `storage` alone
          # deploys the rules file declared in firebase.json.
          #
          # Retry loop: the legacy FIREBASE_TOKEN auth path is being sunset via
          # Google deprecation *brownouts* — short intermittent windows where a
          # still-valid token is rejected with "credentials are no longer valid"
          # (issue #394). A brownout blip can outlast a couple of seconds, so we
          # retry up to 4 times with exponential backoff (15s / 60s / 180s)
          # before giving up. The deploy is idempotent, so retrying a partially
          # applied deploy is safe. Do NOT remove this without fixing the
          # underlying auth (WIF migration) first.
          set -euo pipefail
          BACKOFFS=(15 60 180) # sleep between attempt 1→2, 2→3, 3→4
          # Derived, not hardcoded: keeps attempts and backoffs in lockstep so
          # extending one can never index past the end of the other under set -u.
          MAX_ATTEMPTS=$(( ${#BACKOFFS[@]} + 1 ))
          attempt=1
          while :; do
            echo "Deploy attempt ${attempt}/${MAX_ATTEMPTS}..."
            if npx --yes firebase-tools@15 deploy \
              --project "$PROJECT_ID" \
              --only firestore:rules,firestore:indexes,storage \
              --non-interactive \
              --force; then
              echo "Deploy succeeded on attempt ${attempt}."
              break
            fi
            if [ "$attempt" -ge "$MAX_ATTEMPTS" ]; then
              echo "::error::Deploy failed after ${MAX_ATTEMPTS} attempts."
              exit 1
            fi
            sleep_for="${BACKOFFS[$((attempt - 1))]}"
            echo "Deploy attempt ${attempt} failed; sleeping ${sleep_for}s before retry..."
            sleep "$sleep_for"
            attempt=$((attempt + 1))
          done

      - name: Dry-run summary
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: |
          echo "### Dry run" >> "$GITHUB_STEP_SUMMARY"
          echo "Rules validated against the emulator; deploy step skipped." >> "$GITHUB_STEP_SUMMARY"

      # ---------------------------------------------------------------------
      # Loud failure alerting. If ANY step in this job fails (auth, project
      # resolution, or the deploy itself) open — or update — a single tracking
      # issue so a broken rules deploy can never sit unnoticed again. Idempotent:
      # reuses the one open issue carrying the `firebase-rules-deploy-failure`
      # label instead of spamming a new issue per run.
      # ---------------------------------------------------------------------
      - name: Alert on deploy failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'firebase-rules-deploy-failure';
            const title = '🚨 Firebase rules deploy FAILED';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The **Deploy Firebase Rules** workflow failed.',
              '',
              `- Failed run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Triggered by: \`${context.eventName}\``,
              '',
              'Production Firestore/Storage rules and indexes may now be **stale**.',
              'Investigate the run logs above, then re-run the workflow once fixed.',
              '',
              '_This issue is auto-managed; it will be updated (not duplicated) on repeat failures._',
            ].join('\n');

            // Ensure the label exists (idempotent).
            try {
              await github.rest.issues.getLabel({ ...context.repo, name: label });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  ...context.repo,
                  name: label,
                  color: 'b60205',
                  description: 'Automated alert: Firebase rules deploy failed',
                });
              } else {
                throw e;
              }
            }

            // Find an existing open alert issue to update instead of spamming.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body,
              });
              core.notice(`Updated existing alert issue #${number}.`);
            } else {
              const created = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: [label],
              });
              core.notice(`Opened alert issue #${created.data.number}.`);
            }

      # ---------------------------------------------------------------------
      # Auto-resolve alerting. A successful (non-dry-run) deploy means
      # production rules are back in sync, so close any open alert issue that
      # a prior failure left behind. Without this, the brownout-induced
      # failures (issue #394) would leave a stale "FAILED" issue open even
      # after the very next scheduled run succeeds. Matches the failure step:
      # same label, same run-URL/trigger body style, idempotent (no-op when
      # no alert issue is open).
      # ---------------------------------------------------------------------
      - name: Resolve alert on deploy success
        if: ${{ steps.deploy.outcome == 'success' && github.event.inputs.dry_run != 'true' }}
        uses: actions/github-script@v9
        with:
          script: |
            const label = 'firebase-rules-deploy-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              'The **Deploy Firebase Rules** workflow succeeded — production',
              'Firestore/Storage rules and indexes are back in sync.',
              '',
              `- Successful run: ${runUrl}`,
              `- Commit: \`${context.sha}\``,
              `- Triggered by: \`${context.eventName}\``,
              '',
              'Closing this auto-managed alert. It will reopen automatically on',
              'the next failed deploy.',
            ].join('\n');

            // Find an open alert issue left behind by a prior failure.
            const existing = await github.rest.issues.listForRepo({
              ...context.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              const number = existing.data[0].number;
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: number,
                body,
              });
              await github.rest.issues.update({
                ...context.repo,
                issue_number: number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.notice(`Closed alert issue #${number} after successful deploy.`);
            } else {
              core.notice('No open alert issue to close.');
            }
