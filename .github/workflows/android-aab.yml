name: Build Android AAB
on:
  workflow_dispatch: # Manual trigger - you control when this runs
    inputs:
      verbose:
        description: 'Run gradle with --info (verbose logs for debugging)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.ts'
    tags:
      - 'v*'
jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Inject google-services.json
        # Firebase Android config is git-ignored (contains project keys), so CI
        # must materialise it from a base64-encoded secret. Without it, the
        # google-services Gradle plugin silently no-ops and the release AAB
        # ships with broken FCM + Google sign-in — hard-fail rather than
        # produce a quietly-broken store artifact.
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is empty or unset. Add the base64-encoded android/app/google-services.json as a repo secret before building a release AAB."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
      - name: Build web assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/skatehubba-upload.keystore
      - name: Resolve Android version
        id: version
        run: |
          # versionCode: monotonically increasing workflow run number. Play Store
          # requires each uploaded artifact to have a unique, increasing code.
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          # versionName: if this build was triggered by a v*.*.* tag, strip the
          # leading 'v' and use that. Otherwise leave empty so build.gradle
          # falls back to package.json.version.
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            NAME="${REF#refs/tags/v}"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
          else
            echo "name=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build signed AAB
        working-directory: android
        run: |
          GRADLE_ARGS=(
            bundleRelease
            -PversionCode=${{ steps.version.outputs.code }}
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/skatehubba-upload.keystore
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          )
          if [ -n "${{ steps.version.outputs.name }}" ]; then
            GRADLE_ARGS+=(-PversionName=${{ steps.version.outputs.name }})
          fi
          # --stacktrace is cheap and surfaces the failing task + cause
          # on any failure. --info is opt-in via workflow_dispatch because
          # it produces tens of thousands of lines per build — useful for
          # debugging, harmful as default noise on every push to main.
          GRADLE_ARGS+=(--stacktrace)
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GRADLE_ARGS+=(--info)
          fi
          ./gradlew "${GRADLE_ARGS[@]}"
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: skatehubba-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
