name: Build Android AAB
on:
  workflow_dispatch: # Manual trigger - you control when this runs
    inputs:
      verbose:
        description: 'Run gradle with --info (verbose logs for debugging)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.ts'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      # Runs before the web build so steps.version outputs are available to
      # both the VITE_APP_VERSION env below and the Gradle args later.
      - name: Resolve Android version
        id: version
        # github.ref and github.run_number are routed through env rather than
        # interpolated straight into the script: a tag push carries the tag name
        # in github.ref, and tag names can contain shell metacharacters.
        env:
          REF: ${{ github.ref }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # versionCode: monotonically increasing workflow run number. Play Store
          # requires each uploaded artifact to have a unique, increasing code.
          echo "code=${RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          # versionName: if this build was triggered by a v*.*.* tag, strip the
          # leading 'v' and use that. Otherwise leave empty so build.gradle
          # falls back to package.json.version.
          if [[ "$REF" == refs/tags/v* ]]; then
            NAME="${REF#refs/tags/v}"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
          else
            echo "name=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build web assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_MAPBOX_STYLE_URL: ${{ secrets.VITE_MAPBOX_STYLE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_APPCHECK_ENABLED: ${{ secrets.VITE_APPCHECK_ENABLED }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          # Release tagging for Sentry/PostHog (APP_RELEASE in src/main.tsx).
          # Empty versionName on non-tag builds falls through to the git sha.
          VITE_APP_VERSION: ${{ steps.version.outputs.name }}
          VITE_GIT_SHA: ${{ github.sha }}
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/skatehubba-upload.keystore
      - name: Build signed AAB
        working-directory: android
        # All dynamic values (version outputs, signing secrets, workspace path)
        # are surfaced as env vars instead of being interpolated into the script,
        # keeping tag-derived values and secrets out of the command text.
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          KEYSTORE_FILE: ${{ github.workspace }}/android/app/skatehubba-upload.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERBOSE: ${{ inputs.verbose }}
        run: |
          GRADLE_ARGS=(
            bundleRelease
            -PversionCode="${VERSION_CODE}"
            -Pandroid.injected.signing.store.file="${KEYSTORE_FILE}"
            -Pandroid.injected.signing.store.password="${KEYSTORE_PASSWORD}"
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}"
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}"
          )
          if [ -n "${VERSION_NAME}" ]; then
            GRADLE_ARGS+=(-PversionName="${VERSION_NAME}")
          fi
          # --stacktrace is cheap and surfaces the failing task + cause
          # on any failure. --info is opt-in via workflow_dispatch because
          # it produces tens of thousands of lines per build — useful for
          # debugging, harmful as default noise on every push to main.
          GRADLE_ARGS+=(--stacktrace)
          if [ "${VERBOSE}" = "true" ]; then
            GRADLE_ARGS+=(--info)
          fi
          ./gradlew "${GRADLE_ARGS[@]}"
      - name: Upload AAB
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: skatehubba-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
