name: Build Android AAB
on:
  workflow_dispatch: # Manual trigger - you control when this runs
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.ts'
    tags:
      - 'v*'
jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build web assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/skatehubba-upload.keystore
      - name: Resolve Android version
        id: version
        run: |
          # versionCode: monotonically increasing workflow run number. Play Store
          # requires each uploaded artifact to have a unique, increasing code.
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          # versionName: if this build was triggered by a v*.*.* tag, strip the
          # leading 'v' and use that. Otherwise leave empty so build.gradle
          # falls back to package.json.version.
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            NAME="${REF#refs/tags/v}"
            echo "name=$NAME" >> "$GITHUB_OUTPUT"
          else
            echo "name=" >> "$GITHUB_OUTPUT"
          fi
      - name: Build signed AAB
        working-directory: android
        run: |
          GRADLE_ARGS=(
            bundleRelease
            -PversionCode=${{ steps.version.outputs.code }}
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/skatehubba-upload.keystore
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          )
          if [ -n "${{ steps.version.outputs.name }}" ]; then
            GRADLE_ARGS+=(-PversionName=${{ steps.version.outputs.name }})
          fi
          ./gradlew "${GRADLE_ARGS[@]}"
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: skatehubba-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
