name: Build Android AAB
on:
  workflow_dispatch: # Manual trigger - you control when this runs
    inputs:
      verbose:
        description: 'Run gradle with --info (verbose logs for debugging)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'capacitor.config.ts'
    tags:
      - 'v*'
jobs:
  build:
    name: Build Signed AAB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Resolve build metadata
        id: version
        run: |
          # versionCode: monotonically increasing workflow run number. Play Store
          # requires each uploaded artifact to have a unique, increasing code.
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          # For tag builds (refs/tags/vX.Y.Z) emit two forms of the version:
          #  - name: unprefixed SemVer for Gradle's -PversionName= (build.gradle
          #    requires a numeric-ish string; a leading 'v' is invalid).
          #  - appVersion: the raw tag name (with 'v' prefix) mirroring the
          #    value release.yml passes as VITE_APP_VERSION, so Sentry groups
          #    web and Android crashes under the same release string.
          # Non-tag builds leave both empty: Gradle falls back to
          # package.json.version, and the Vite build falls through to
          # VITE_GIT_SHA (github.sha) as the release identifier — keeping
          # CI/dev builds from masquerading as the current tagged release
          # in Sentry.
          REF="${{ github.ref }}"
          if [[ "$REF" == refs/tags/v* ]]; then
            TAG="${REF#refs/tags/}"
            echo "name=${TAG#v}" >> "$GITHUB_OUTPUT"
            echo "appVersion=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "name=" >> "$GITHUB_OUTPUT"
            echo "appVersion=" >> "$GITHUB_OUTPUT"
          fi
      # This env block must stay in sync with the VITE_* schema in
      # src/lib/env.ts — any VITE_* var read by the running app at runtime
      # needs to be injected here so it lands in the built bundle that
      # Capacitor ships inside the Android WebView.
      - name: Build web assets
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_MAPBOX_STYLE_URL: ${{ secrets.VITE_MAPBOX_STYLE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_APPCHECK_ENABLED: ${{ secrets.VITE_APPCHECK_ENABLED }}
          VITE_RECAPTCHA_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_SITE_KEY }}
          # Release identifier used by main.tsx → Sentry.init({release}). For
          # tag builds this matches release.yml's VITE_APP_VERSION exactly so
          # a v1.2.3 release unifies web + Android crash grouping. For non-tag
          # builds appVersion is empty and main.tsx falls through to
          # VITE_GIT_SHA below.
          VITE_APP_VERSION: ${{ steps.version.outputs.appVersion }}
          VITE_GIT_SHA: ${{ github.sha }}
      - name: Sync Capacitor
        run: npx cap sync android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/skatehubba-upload.keystore
      - name: Build signed AAB
        working-directory: android
        run: |
          GRADLE_ARGS=(
            bundleRelease
            -PversionCode=${{ steps.version.outputs.code }}
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/android/app/skatehubba-upload.keystore
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }}
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }}
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          )
          if [ -n "${{ steps.version.outputs.name }}" ]; then
            GRADLE_ARGS+=(-PversionName=${{ steps.version.outputs.name }})
          fi
          # --stacktrace is cheap and surfaces the failing task + cause
          # on any failure. --info is opt-in via workflow_dispatch because
          # it produces tens of thousands of lines per build — useful for
          # debugging, harmful as default noise on every push to main.
          GRADLE_ARGS+=(--stacktrace)
          if [ "${{ inputs.verbose }}" = "true" ]; then
            GRADLE_ARGS+=(--info)
          fi
          ./gradlew "${GRADLE_ARGS[@]}"
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: skatehubba-release
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30
