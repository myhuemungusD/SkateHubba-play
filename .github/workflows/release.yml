name: Release Build & Publish

# Triggered when release-please publishes a GitHub Release after its PR merges.
# release-please handles tagging, CHANGELOG, and the Release itself; this
# workflow attaches the production build artifact and notifies Sentry of the
# new version so source-mapped stack traces can be demangled in production.
on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Release event payload references the tag; check it out explicitly
          # so the build matches the exact commit release-please just tagged.
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_POSTHOG_KEY: ${{ secrets.VITE_POSTHOG_KEY }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST }}
          # Stamped at build time so the running app reports the same release
          # string Sentry expects (see src/lib/sentry.ts + src/main.tsx).
          VITE_APP_VERSION: ${{ github.event.release.tag_name }}

      - name: Notify Sentry of new release
        # Uploads hidden source maps (generated by vite with `build.sourcemap: 'hidden'`)
        # and associates them with the release tag so production stack traces
        # demangle. Silently skipped if SENTRY_AUTH_TOKEN is absent — a fresh
        # repo without Sentry configured still ships a valid GitHub Release.
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.event.release.tag_name }}
          sourcemaps: ./dist/assets
          # Remove the maps from dist/ after upload so they don't ship to the
          # CDN publicly; Sentry keeps them server-side for demangling only.
          strip_common_prefix: true

      - name: Archive build output
        run: cd dist && zip -r ../skatehubba-${{ github.event.release.tag_name }}.zip .

      - name: Attach build artifact to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: skatehubba-${{ github.event.release.tag_name }}.zip
