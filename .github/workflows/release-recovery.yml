name: Release Recovery (v1.1.0 retroactive tag)

# One-shot recovery for the 2026-04-19 release-please outage.
#
# PR #247 ("chore: release main") merged into main as commit 5050f212 on
# 2026-04-19T19:01:02Z. The release-please-action@v4 tagging step did not
# fire, so no v1.1.0 git tag or GitHub Release was ever created. Every
# subsequent release-please run has aborted with
#   "There are untagged, merged release PRs outstanding - aborting".
#
# This workflow is workflow_dispatch only (manual run by a maintainer).
# It creates the v1.1.0 tag at the original merge commit, opens a GitHub
# Release at that tag, and flips PR #247's label from
# `autorelease: pending` to `autorelease: tagged` so release-please can
# resume on the next push to main.
#
# Known limitation (intentional): the GitHub Release created here will NOT
# trigger `release.yml` (which listens on `release: published`). GitHub
# Actions suppresses downstream workflow runs for events created by the
# default `GITHUB_TOKEN`. That means v1.1.0 will not retroactively get a
# build artifact attached or a Sentry source-map upload — those were
# missed when the original April release-please run failed, and we are
# not backfilling them here. v1.1.0 has been running in production for
# two months without those assets; the marginal value of backfilling does
# not justify adding a `workflow_dispatch` trigger to the load-bearing
# release.yml or provisioning a PAT/App-token secret. v1.2.0+ will work
# normally because release-please uses its own GitHub App token.
#
# Delete this file in a follow-up PR after the run succeeds.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type YES to confirm you understand this creates v1.1.0 retroactively'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  recover-v1-1-0:
    if: github.event.inputs.confirm == 'YES'
    runs-on: ubuntu-latest
    steps:
      # actions/github-script v7.0.1 — pinned by SHA per CLAUDE.md hardening
      - name: Create v1.1.0 tag, Release, and flip PR #247 label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const tag   = 'v1.1.0';
            const sha   = '5050f21207467848a9fab1e78f4d98d846866951';
            const prNumber = 247;

            // 1. Verify the merge commit exists on the default branch.
            await github.rest.repos.getCommit({ owner, repo, ref: sha });
            core.info(`Verified merge commit ${sha} exists.`);

            // 2. Check whether the tag already exists; if it does, skip
            //    the tag-create step (idempotent re-run safety).
            let tagExists = false;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              tagExists = true;
              core.info(`Tag ${tag} already exists — skipping tag create.`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            if (!tagExists) {
              const tagObj = await github.rest.git.createTag({
                owner, repo,
                tag,
                message: [
                  'Release v1.1.0',
                  '',
                  'Retroactive tag created via release-recovery.yml workflow.',
                  'The release-please-action tagging step did not fire when PR',
                  `#${prNumber} merged on 2026-04-19. CHANGELOG and package.json`,
                  'updates landed; only the tag/Release creation failed.',
                  '',
                  `Tag points at PR #${prNumber}'s merge commit (${sha}).`,
                ].join('\n'),
                object: sha,
                type: 'commit',
                tagger: {
                  name:  'github-actions[bot]',
                  email: '41898282+github-actions[bot]@users.noreply.github.com',
                  date:  new Date().toISOString(),
                },
              });
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/tags/${tag}`,
                sha: tagObj.data.sha,
              });
              core.info(`Created annotated tag ${tag} -> ${sha}`);
            }

            // 3. Create the GitHub Release (skip if it already exists).
            let releaseExists = false;
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              releaseExists = true;
              core.info(`Release ${tag} already exists — skipping release create.`);
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            if (!releaseExists) {
              await github.rest.repos.createRelease({
                owner, repo,
                tag_name: tag,
                name: tag,
                target_commitish: sha,
                body: [
                  '> Retroactive release entry.',
                  '',
                  `The substantive release notes for v1.1.0 are in [PR #${prNumber}](https://github.com/${owner}/${repo}/pull/${prNumber})`,
                  'and the CHANGELOG.md `## [1.1.0]` section.',
                  '',
                  'This Release exists so that:',
                  '- release-please can resume computing version deltas on the next push to main',
                  '- the historical record of shipped versions matches reality',
                  '',
                  'Note: no build artifact is attached and no Sentry release was',
                  'registered for v1.1.0 — `release.yml` (the artifact + Sentry',
                  'workflow) does not fire on releases created via GITHUB_TOKEN.',
                  'v1.1.0 has been running in production without these assets',
                  'since 2026-04-19; v1.2.0+ will register normally.',
                ].join('\n'),
                draft: false,
                prerelease: false,
              });
              core.info(`Created Release ${tag}`);
            }

            // 4. Flip PR #247's label so release-please's state machine
            //    sees the release as completed.
            const pendingLabel = 'autorelease: pending';
            const taggedLabel  = 'autorelease: tagged';

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = labels.map((l) => l.name);

            if (labelNames.includes(pendingLabel)) {
              await github.rest.issues.removeLabel({
                owner, repo, issue_number: prNumber, name: pendingLabel,
              });
              core.info(`Removed '${pendingLabel}' from PR #${prNumber}`);
            }
            if (!labelNames.includes(taggedLabel)) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: prNumber, labels: [taggedLabel],
              });
              core.info(`Added '${taggedLabel}' to PR #${prNumber}`);
            }

            core.info('Recovery complete. Delete this workflow file in a follow-up PR.');
