name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily drift audit (see audit-nightly below). 06:13 UTC — off the
    # top-of-hour spike so the run isn't queued behind everyone else's crons.
    - cron: "13 6 * * *"
  # Manual smoke-test hook for audit-nightly: schedule-triggered jobs only
  # fire from the workflow file on the default branch, so this is the only
  # way to exercise that job before (or without) waiting for the cron.
  # Dispatch runs are audit-only — build-and-test and its dependents skip.
  # Note: workflow_dispatch runs the workflow DEFINITION from whatever branch
  # is selected in the UI (only the checkout below is pinned to main). If
  # audit-nightly's step list is being edited on a feature branch, dispatch
  # from that branch to test the pending changes, but expect the audit itself
  # to run against main's lockfile — that pinning is intentional (see below).
  workflow_dispatch:

# Least-privilege baseline: read-only across the workflow. Each job that
# genuinely needs to write (e.g. lighthouse posting statuses/PR comments)
# escalates explicitly under its own `permissions:` block. Especially
# relevant for the unattended `audit-nightly` cron below, which runs
# `npm ci` (arbitrary postinstall scripts) on a schedule against main —
# a malicious transitive must not inherit a write-scoped GITHUB_TOKEN.
permissions:
  contents: read

concurrency:
  # event_name is part of the group so a scheduled run on refs/heads/main can
  # never cancel (or be cancelled by) an in-flight push run on the same ref.
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # Scheduled + manually dispatched runs are audit-only — skipping this job
    # also skips e2e and lighthouse via their `needs` edges.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the dependency-change detection below can diff
          # against the PR base / previous push head (same requirement as the
          # merge-base diffs in pr-gate.yml).
          fetch-depth: 0

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # ── Dependency audit, scoped to what this change can control ──
      # History: the audit used to run unconditionally as a hard gate, which
      # meant every advisory published against an EXISTING pinned transitive
      # instantly broke every open PR — including PRs that never touched a
      # dependency (two consecutive days of this in 2026-07 forced hand-bumps
      # into unrelated PRs). Policy now:
      #   • change touches package.json / package-lock.json → audit BLOCKS
      #     (nobody can introduce a vulnerable dep),
      #   • change doesn't touch deps → audit still runs, report-only
      #     (signal preserved, PR not held hostage for drift it can't fix),
      #   • drift itself is caught by the daily audit-nightly job below +
      #     Dependabot PRs.
      # Detection fails SAFE on BOTH event paths: any state where the diff
      # range can't be resolved (forced push, missing before-SHA, git error)
      # treats deps as changed so the blocking audit runs.
      - name: Detect dependency manifest changes
        id: deps
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            RANGE="origin/${BASE_REF}...HEAD"
          else
            if [ -z "$BEFORE_SHA" ] || ! git cat-file -e "$BEFORE_SHA" 2>/dev/null; then
              echo "::warning::Cannot resolve previous head (before-SHA missing or unknown to this clone) — failing safe: treating deps as changed so the blocking audit runs."
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            RANGE="${BEFORE_SHA}..HEAD"
          fi
          # `if !` keeps set -e from killing the step; a git error must land
          # in the fail-safe branch, not silently select report-only mode.
          if ! CHANGED_FILES=$(git diff --name-only "$RANGE" -- package.json package-lock.json); then
            echo "::warning::git diff failed for range $RANGE — failing safe: treating deps as changed so the blocking audit runs."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$CHANGED_FILES" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Audit dependencies (blocking — this change touches deps)
        if: steps.deps.outputs.changed == 'true'
        run: |
          npm audit --audit-level=moderate

      - name: Audit dependencies (report-only — deps untouched by this change)
        if: steps.deps.outputs.changed != 'true'
        run: |
          if ! npm audit --audit-level=moderate; then
            echo "::warning::npm audit found advisories in existing pinned dependencies. This change does not touch package.json/package-lock.json, so it is not blocked. Drift is handled by the nightly audit job and Dependabot."
          fi

      - name: Guard against as-any in production code
        run: |
          if grep -rn "as any" src/ --include="*.ts" --include="*.tsx" | grep -v __tests__ | grep -v __mocks__ | grep -v ".test."; then
            echo "::error::'as any' found in production code. Keep type casts in test files only."
            exit 1
          fi

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Scan test files for duplicated blocks
        # Mirrors the pr-gate.yml job. Without this, a PR that slips past the
        # gate (e.g. via merge ordering) leaves main green while every later PR
        # inherits the failure on its first sync from main.
        run: node scripts/check-test-duplication.mjs

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: placeholder
          VITE_FIREBASE_AUTH_DOMAIN: placeholder.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: placeholder
          VITE_FIREBASE_STORAGE_BUCKET: placeholder.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
          VITE_FIREBASE_APP_ID: "1:000000000000:web:placeholder"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: dist/
          retention-days: 7

  e2e:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: e2e_run
        continue-on-error: true
        run: npm run test:e2e 2>&1 | tee e2e-output.log

      - name: Dump E2E output to summary
        if: always()
        run: |
          echo "### E2E Test Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          grep -E 'passed|failed|timed out|Error|FAIL|PASS|\[diag\]|timeout|✓|✘|›' e2e-output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No relevant output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Last 150 lines" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -150 e2e-output.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Fail if E2E tests failed
        if: steps.e2e_run.outcome == 'failure'
        run: exit 1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            e2e-output.log
          retention-days: 14

  lighthouse:
    needs: build-and-test
    runs-on: ubuntu-latest
    # LHCI uses GITHUB_TOKEN to publish commit statuses and (when configured)
    # PR comments. Escalate above the workflow-level `contents: read` baseline
    # for just this job — every other job stays read-only.
    permissions:
      contents: read
      statuses: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: dist/

      - name: Run Lighthouse CI
        run: npx @lhci/cli autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Nightly dependency-drift audit ──
  # Companion to the deps-scoped audit in build-and-test: PRs only block on
  # advisories THEY introduce; advisories published against main's existing
  # lockfile surface here instead — a red scheduled run in the Actions tab is
  # the alert, and the fix lands via Dependabot or a dedicated dep-bump PR
  # rather than being hand-patched into whatever PR happens to be open.
  # Root package only: functions/ carries known unfixable moderates via
  # firebase-admin transitives (tracked upstream), so auditing it here would
  # leave this job permanently red and train everyone to ignore it.
  audit-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Cap the run so a hung registry doesn't burn nightly minutes toward
    # GitHub's 6-hour job default. `npm ci` + `npm audit` completes in ~1 min
    # even on cold caches; 10 minutes is comfortable headroom.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          # Pin to main so `workflow_dispatch` fired from a feature branch still
          # audits main's lockfile. Otherwise a dispatch from an outdated branch
          # would report drift against that branch's stale lockfile and either
          # cry wolf or (worse) miss a real advisory that only exists on main.
          # Schedule runs already default to main; this only affects dispatch.
          ref: main

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Audit dependencies (blocking — main lockfile drift)
        run: |
          npm audit --audit-level=moderate
