name: PR Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  enforce-pr-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Block direct pushes from bots without review
        run: |
          echo "✅ PR gate passed — this change arrived via pull request."
          echo ""
          echo "Branch protection policy requires:"
          echo "  - At least 1 approving review from a CODEOWNER"
          echo "  - All CI status checks passing (build-and-test)"
          echo "  - Branch is up to date with main before merge"
          echo ""
          echo "See .github/BRANCH_PROTECTION.md for full ruleset."

  guard-as-any-casts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject as-any in production code
        run: |
          if grep -rn "as any" src/ --include="*.ts" --include="*.tsx" | grep -v __tests__ | grep -v __mocks__ | grep -v ".test."; then
            echo "::error::'as any' found in production code. Keep type casts in test files only."
            exit 1
          fi

  verify-no-cloud-functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject new Cloud Functions code
        run: |
          # Reject any new Cloud Functions source under functions/src/. The
          # functions/ package was removed (see CLAUDE.md "No Cloud Functions"
          # guardrail); this guard prevents AI agents from silently
          # reintroducing it.
          if git diff origin/main...HEAD --name-only | grep -qE '^functions/src/'; then
            echo "::error::New Cloud Functions source detected in functions/src/."
            echo "Cloud Functions require explicit maintainer approval."
            echo "See .github/BRANCH_PROTECTION.md for details."
            exit 1
          fi

  guard-todo-fixme-hack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject TODO/FIXME/HACK in production code
        run: |
          MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" -E '\b(TODO|FIXME|HACK)\b' src/ || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo ""
            echo "::error::TODO/FIXME/HACK comments found in src/. Resolve before merging."
            exit 1
          fi

  verify-workflow-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Flag workflow file modifications
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only -- '.github/workflows/' || true)
          if [ -n "$CHANGED" ]; then
            echo "::warning::CI workflow files modified in this PR:"
            echo "$CHANGED"
            echo ""
            echo "Workflow changes require maintainer review (CODEOWNERS enforced)."
          else
            echo "No workflow changes detected."
          fi

  check-test-duplication:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Scan test files for duplicated blocks
        run: node scripts/check-test-duplication.mjs

  check-file-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Report files over length budget (non-blocking)
        # Soft budget: surface the report in logs but never fail the PR gate.
        # Use --strict locally to enforce; CI stays informational.
        continue-on-error: true
        run: node scripts/check-file-length.mjs

  validate-firebase-rules:
    name: Validate Firebase rules changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect rules-related changes
        id: changed
        run: |
          if git diff origin/main...HEAD --name-only | \
             grep -qE '^(firestore\.rules|firestore\.indexes\.json|storage\.rules|rules-tests/)'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.changed.outputs.touched == 'true'
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        if: steps.changed.outputs.touched == 'true'
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
        if: steps.changed.outputs.touched == 'true'

      - name: Run Firestore rules tests
        if: steps.changed.outputs.touched == 'true'
        run: npm run test:rules

      - name: Skip note
        if: steps.changed.outputs.touched != 'true'
        run: echo "No rules-related changes — skipping rules emulator tests."
