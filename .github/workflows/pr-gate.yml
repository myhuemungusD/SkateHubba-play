name: PR Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  # Cancel superseded runs when a PR is pushed again, so the gate's jobs don't
  # keep running against stale commits.
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enforce-pr-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Block direct pushes from bots without review
        run: |
          echo "✅ PR gate passed — this change arrived via pull request."
          echo ""
          echo "Branch protection policy requires:"
          echo "  - At least 1 approving review from a CODEOWNER"
          echo "  - All CI status checks passing (build-and-test)"
          echo "  - Branch is up to date with main before merge"
          echo ""
          echo "See .github/BRANCH_PROTECTION.md for full ruleset."

  guard-as-any-casts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Reject as-any in production code
        run: |
          # Covers both the app (src/) and the approved Cloud Functions
          # codebase (functions/src/), with the same test-file exclusions.
          if grep -rn "as any" src/ functions/src/ --include="*.ts" --include="*.tsx" | grep -v __tests__ | grep -v __mocks__ | grep -v ".test."; then
            echo "::error::'as any' found in production code. Keep type casts in test files only."
            exit 1
          fi

  verify-no-cloud-functions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Need full history so `git diff origin/main...HEAD` resolves the
          # merge-base correctly. With the default shallow clone, the diff
          # can return empty and silently let new functions/src/ slip past.
          fetch-depth: 0

      - name: Enforce Cloud Functions allowlist
        run: |
          # The stats close-out function is the one maintainer-approved,
          # application-authored Cloud Functions codebase (see docs/CHARTER.md
          # §4.14 and the CLAUDE.md guardrail table). It replaced a client-side
          # stats-replay path that corrupted production win/loss counters.
          # This gate pins its EXACT file set: any changed file under
          # functions/src/ that is not on the allowlist below hard-fails, so no
          # future PR can smuggle new authored Cloud Functions in beside it.
          VIOLATIONS=""
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              functions/src/index.ts|functions/src/index.test.ts|functions/src/applyGameStats.ts|functions/src/applyGameStats.test.ts) ;;
              *) VIOLATIONS="${VIOLATIONS}${file}"$'\n' ;;
            esac
          done < <(git diff origin/main...HEAD --name-only | grep -E '^functions/src/' || true)

          if [ -n "$VIOLATIONS" ]; then
            printf '%s' "$VIOLATIONS"
            echo "::error::Unapproved Cloud Functions source detected under functions/src/."
            echo "Only the maintainer-approved stats close-out file set is allowed:"
            echo "  functions/src/index.ts"
            echo "  functions/src/index.test.ts"
            echo "  functions/src/applyGameStats.ts"
            echo "  functions/src/applyGameStats.test.ts"
            echo "Any other functions/src/ code requires explicit maintainer approval."
            echo "See .github/BRANCH_PROTECTION.md for details."
            exit 1
          fi

  guard-todo-fixme-hack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Reject TODO/FIXME/HACK in production code
        run: |
          MATCHES=$(grep -rn --include="*.ts" --include="*.tsx" -E '\b(TODO|FIXME|HACK)\b' src/ || true)
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo ""
            echo "::error::TODO/FIXME/HACK comments found in src/. Resolve before merging."
            exit 1
          fi

  verify-workflow-changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Same merge-base requirement as verify-no-cloud-functions — without
          # full history, the diff returns empty and the warning never fires.
          fetch-depth: 0

      - name: Flag workflow file modifications
        run: |
          CHANGED=$(git diff origin/main...HEAD --name-only -- '.github/workflows/' || true)
          if [ -n "$CHANGED" ]; then
            echo "::warning::CI workflow files modified in this PR:"
            echo "$CHANGED"
            echo ""
            echo "Workflow changes require maintainer review (CODEOWNERS enforced)."
          else
            echo "No workflow changes detected."
          fi

  check-test-duplication:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Scan test files for duplicated blocks
        run: node scripts/check-test-duplication.mjs

  check-file-length:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - name: Report files over length budget (non-blocking)
        # Soft budget: surface the report in logs but never fail the PR gate.
        # Use --strict locally to enforce; CI stays informational.
        continue-on-error: true
        run: node scripts/check-file-length.mjs

  validate-firebase-rules:
    name: Validate Firebase rules changes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect rules-related changes
        id: changed
        run: |
          if git diff origin/main...HEAD --name-only | \
             grep -qE '^(firestore\.rules|firestore\.indexes\.json|storage\.rules|rules-tests/)'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.changed.outputs.touched == 'true'
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        if: steps.changed.outputs.touched == 'true'
        with:
          distribution: temurin
          java-version: 21

      - run: npm ci
        if: steps.changed.outputs.touched == 'true'

      - name: Run Firestore rules tests
        if: steps.changed.outputs.touched == 'true'
        run: npm run test:rules

      - name: Skip note
        if: steps.changed.outputs.touched != 'true'
        run: echo "No rules-related changes — skipping rules emulator tests."

  build-functions:
    name: Build and test Cloud Functions
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # Same merge-base requirement as the other change-scoped jobs —
          # without full history the diff returns empty and this gate
          # silently no-ops instead of building the functions package.
          fetch-depth: 0

      - name: Detect functions changes
        id: changed
        run: |
          if git diff origin/main...HEAD --name-only | grep -qE '^functions/'; then
            echo "touched=true" >> "$GITHUB_OUTPUT"
          else
            echo "touched=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        if: steps.changed.outputs.touched == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        if: steps.changed.outputs.touched == 'true'
        working-directory: functions
        run: npm ci

      - name: Build functions
        if: steps.changed.outputs.touched == 'true'
        working-directory: functions
        run: npm run build

      - name: Test functions
        if: steps.changed.outputs.touched == 'true'
        working-directory: functions
        run: npm test

      - name: Skip note
        if: steps.changed.outputs.touched != 'true'
        run: echo "No functions/ changes — skipping Cloud Functions build and tests."
