<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="SkateHubba™ — The first async S.K.A.T.E. trick battle game. Set tricks. Match tricks. One take only." />
    <title>SkateHubba™ S.K.A.T.E.</title>
    <link rel="canonical" href="https://skatehubba.com/" />
    <link rel="icon" href="/icon-192.png" type="image/png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkateHubba" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skatehubba.com" />
    <meta property="og:title" content="SkateHubba™ — Async S.K.A.T.E. Trick Battles" />
    <meta property="og:description" content="The first async S.K.A.T.E. trick battle game. Set tricks. Match tricks. One take only." />
    <meta property="og:site_name" content="SkateHubba" />
    <meta property="og:image" content="https://skatehubba.com/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkateHubba™ — Async S.K.A.T.E. Trick Battles" />
    <meta name="twitter:description" content="The first async S.K.A.T.E. trick battle game. Set tricks. Match tricks. One take only." />
    <meta name="twitter:image" content="https://skatehubba.com/icon-512.png" />

    <!-- Firebase -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SkateHubba",
      "alternateName": "SkateHubba S.K.A.T.E.",
      "url": "https://skatehubba.com",
      "description": "The first async S.K.A.T.E. trick battle game. Set tricks. Match tricks. One take only.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with camera access",
      "image": "https://skatehubba.com/icon-512.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body class="bg-[#0A0A0A] text-white antialiased">
    <div id="root"></div>
    <script>
      // Unregister stale service workers left by previous setups
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          registrations.forEach(function(registration) { registration.unregister(); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
