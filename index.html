<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://apis.google.com https://www.gstatic.com https://www.google.com https://api.mapbox.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src 'self' https://fonts.gstatic.com https://api.mapbox.com; connect-src 'self' https://www.google.com https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://firebasestorage.googleapis.com https://*.firebasestorage.app https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firebaseinstallations.googleapis.com https://fcm.googleapis.com https://fcmregistrations.googleapis.com https://vitals.vercel-insights.com https://*.sentry.io wss://*.firebaseio.com https://api.mapbox.com https://*.tiles.mapbox.com https://events.mapbox.com; frame-src 'self' https://accounts.google.com https://*.firebaseapp.com https://www.google.com; img-src 'self' data: blob: https://firebasestorage.googleapis.com https://*.firebasestorage.app https://lh3.googleusercontent.com https://*.tiles.mapbox.com; media-src 'self' blob: https://firebasestorage.googleapis.com https://*.firebasestorage.app; object-src 'none'; base-uri 'self'; form-action 'self' https://accounts.google.com https://*.firebaseapp.com; upgrade-insecure-requests" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0A" />
    <!-- Dark-only app chrome: keeps iOS form controls + scrollbars rendering
         against the dark surface instead of flashing to light mode defaults. -->
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark" />
    <meta name="description" content="SkateHubba™ — The first async S.K.A.T.E. trick battle game. For the love of the game." />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="SkateHubba" />
    <title>SkateHubba™ S.K.A.T.E.</title>
    <link rel="canonical" href="https://skatehubba.com/" />
    <link rel="icon" href="/logoblack.png" type="image/png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SkateHubba" />
    <!-- Use the larger PWA icon as the iOS home-screen icon so it stays sharp
         on high-DPI devices (iPad Pro, Plus iPhones). Keep the smaller 192 as
         a declared size hint; iOS picks the best match for the display. -->
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://skatehubba.com/" />
    <meta property="og:title" content="SkateHubba™ — For the Love of the Game" />
    <meta property="og:description" content="The first async S.K.A.T.E. trick battle game. For the love of the game." />
    <meta property="og:site_name" content="SkateHubba" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://skatehubba.com/logonew.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1536" />
    <meta property="og:image:height" content="1024" />
    <meta property="og:image:alt" content="SkateHubba — async S.K.A.T.E. trick battle game logo" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkateHubba™ — For the Love of the Game" />
    <meta name="twitter:description" content="The first async S.K.A.T.E. trick battle game. For the love of the game." />
    <meta name="twitter:image" content="https://skatehubba.com/logonew.png" />
    <meta name="twitter:image:alt" content="SkateHubba — async S.K.A.T.E. trick battle game logo" />

    <!-- Firebase -->
    <link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />

    <!-- Brand logo (critical for first paint) -->
    <link rel="preload" href="/logonew.webp" as="image" type="image/webp" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "SkateHubba",
      "alternateName": "SkateHubba S.K.A.T.E.",
      "url": "https://skatehubba.com",
      "description": "The first async S.K.A.T.E. trick battle game. For the love of the game.",
      "applicationCategory": "GameApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with camera access",
      "image": "https://skatehubba.com/logonew.png",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body class="bg-[#0A0A0A] text-white antialiased grain">
    <div id="root"></div>
    <script src="/sw-cleanup.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
